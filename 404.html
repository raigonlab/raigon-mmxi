<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — raigon</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { overflow: hidden; }

    .not-found {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
    }

    .not-found-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(120px, 20vw, 240px);
      font-weight: 300;
      font-style: italic;
      color: rgba(232, 228, 220, 0.08);
      line-height: 1;
      user-select: none;
      letter-spacing: -4px;
    }

    .not-found-label {
      font-family: 'Syne', sans-serif;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(232, 228, 220, 0.3);
      margin-top: -8px;
      margin-bottom: 48px;
    }

    .not-found-home {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(232, 228, 220, 0.4);
      background: rgba(232, 228, 220, 0.06);
      border: 1px solid rgba(232, 228, 220, 0.1);
      border-radius: 100px;
      padding: 12px 28px;
      text-decoration: none;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .not-found-home:hover {
      color: #7aa8d0;
      border-color: rgba(122, 168, 208, 0.3);
      background: rgba(122, 168, 208, 0.06);
    }

    /* Subtle orbs */
    .not-found::before,
    .not-found::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }

    .not-found::before {
      width: 400px;
      height: 400px;
      background: rgba(122, 168, 208, 0.04);
      top: 10%;
      right: 15%;
    }

    .not-found::after {
      width: 300px;
      height: 300px;
      background: rgba(200, 169, 110, 0.04);
      bottom: 15%;
      left: 10%;
    }
  </style>
</head>

<body>

  <!-- Logo links back to home -->
  <a href="index.html" class="global-logo" aria-label="Go to Home" style="text-decoration:none;">
    <div class="logo-ring-wrap">
      <svg class="logo-ring-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <path id="text-ring" d="M130,130 m-108,0 a108,108 0 1,1 216,0 a108,108 0 1,1 -216,0" />
        </defs>
        <text class="logo-ring-text">
          <textPath href="#text-ring">RAIGON LAB · TM · MMXXVI · RAIGON LAB · TM · MMXXVI · </textPath>
        </text>
      </svg>
      <div class="logo-icon-wrap">
        <svg class="logo-icon-svg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg"
          aria-label="Raigon logo mark">
          <path
            d="M168.9,837.6h145.7c9.8,0,17.8-5.5,17.8-13.8v-98.5l199.6-101.2,171.6,203.2c5.3,6.3,13.9,10,23,10h153.4c18.1,0,48.6.7,18.1-29.9l-216.2-255.4,271-137.3h0s0,0,0,0l-31-51.6h0c-.3-.6-39.5-68.7-48-76.5,0,0,0,0,0,0-.2-.2-3.2-3.4-8.5-7.9-8.8-7.3-23.8-17.9-42.9-23.9-.8-.3-1.7-.6-2.6-.8,0,0-.2,0-.3,0-4-1.1-8.2-2-12.5-2.7,0,0,0,0,0,0-30.1-5.8-65-8.8-104.9-8.8H168.9c-9.8,0-17.8,6.8-17.8,15.1v560.7c0,8.4,8,19.4,17.8,19.4ZM332.5,382c0-8.4,8-15.1,17.8-15.1h317c32.9-.5,47.7,8.4,47.7,8.4l-382.5,186.8v-180.1Z" />
        </svg>
      </div>
    </div>
  </a>

  <div class="not-found">
    <div class="not-found-number">404</div>
    <div class="not-found-label">Page not found</div>
    <a class="not-found-home" href="index.html">Return home</a>
  </div>

</body>

</html>
