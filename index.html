   <!-- ============================================================

              <!-- Circular guide path that the text follows -->
              <path id="text-ring" d="M130,130 m-108,0 a108,108 0 1,1 216,0 a108,108 0 1,1 -216,0"/>

            <text class="logo-ring-text">
              <textPath href="#text-ring">RAIGON LAB · TM · MMXXVI · RAIGON LAB · TM · MMXXVI · </textPath>
            </text>
          </svg>
          <!-- Centre icon — SVG inline so fill colour is controlled by CSS -->

            <svg class="logo-icon-svg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" aria-label="Raigon logo mark">

            </svg>
          </div>

        </div>
      </div>
